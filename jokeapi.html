<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokes API</title>
</head>
<body>

    <button onclick="getJoke()">Get Funny Joke</button>

    <h3 id="setup"></h3>
    <h4 id="punchline"></h4>

    <script>

        async function getJoke() {

            try {

                const response = await fetch("https://official-joke-api.appspot.com/random_joke");

                if (!response.ok) {
                    throw new Error("Failed to fetch joke");
                }

                const data = await response.json();

                document.getElementById("setup").textContent = data.setup;
                document.getElementById("punchline").textContent = data.punchline;

            }
            catch (err) {
                document.getElementById("setup").textContent = "Something went wrong!";
                document.getElementById("punchline").textContent = "";
            }

        }

    </script>

</body>
</html>
